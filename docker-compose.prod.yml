services:
  minio:
    ports: !reset
      - "9000:9000"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: prod
    volumes: !reset []
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: prod
    volumes: !reset []
    ports: !reset []
    expose:
      - "3000"
    restart: always

  nginx:
    image: nginx:1.27-alpine
    restart: always
    depends_on:
      frontend:
        condition: service_started
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
      - "443:443"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
